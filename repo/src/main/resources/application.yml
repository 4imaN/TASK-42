spring:
  datasource:
    url: jdbc:mysql://localhost:3306/reclaim_portal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: reclaim_user
    password: reclaim_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration-mysql

  thymeleaf:
    cache: false

  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 20MB

server:
  port: 8080

reclaim:
  security:
    jwt-secret: ${RECLAIM_JWT_SECRET:}
    refresh-secret: ${RECLAIM_REFRESH_SECRET:}
    encryption-key: ${RECLAIM_ENCRYPTION_KEY:}
    access-token-minutes: 30
    refresh-token-days: 7
    max-failed-attempts: 5
    lockout-minutes: 15

  storage:
    root-path: ./storage
    max-file-size: 3145728
    allowed-extensions: jpg,jpeg,png

  bootstrap:
    passwords-file: ""

  appointments:
    business-start-hour: 8
    business-end-hour: 18
    slot-minutes: 30
    min-advance-hours: 2
    max-advance-days: 14
    pickup-capacity: 5
    dropoff-capacity: 5

  contracts:
    expiring-soon-days: 30
