<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="en"
      layout:decorate="~{layouts/default}">
<head>
    <title>Change Password</title>
</head>
<body>

<div layout:fragment="content">

    <div class="page-header">
        <div class="page-header-info">
            <span class="page-eyebrow">Account Security</span>
            <h1 class="page-title">Change Password</h1>
        </div>
    </div>

    <div style="max-width:480px;">

        <div id="alertBox" class="alert alert-error hidden" role="alert" aria-live="assertive"></div>
        <div id="successBox" class="alert alert-success hidden" role="status" aria-live="polite"></div>

        <div class="card">
            <div class="card-body">

                <form id="changePasswordForm" novalidate>

                    <div class="form-group">
                        <label class="form-label" for="oldPassword">Current Password</label>
                        <div class="input-wrap">
                            <input type="password" id="oldPassword" name="oldPassword"
                                   autocomplete="current-password"
                                   placeholder="Enter current password" required/>
                        </div>
                        <span class="form-error" id="oldPasswordError"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="newPassword">New Password</label>
                        <div class="input-wrap">
                            <input type="password" id="newPassword" name="newPassword"
                                   autocomplete="new-password"
                                   placeholder="Enter new password" required/>
                        </div>
                        <span class="form-error" id="newPasswordError"></span>
                        <!-- Complexity hints (populated by app.js initPasswordHints) -->
                        <div id="pwHints" class="pw-hints"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirmPassword">Confirm New Password</label>
                        <div class="input-wrap">
                            <input type="password" id="confirmPassword" name="confirmPassword"
                                   autocomplete="new-password"
                                   placeholder="Repeat new password" required/>
                        </div>
                        <span class="form-error" id="confirmPasswordError"></span>
                    </div>

                    <div style="margin-top:1.5rem; display:flex; gap:.75rem;">
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                            <span id="btnLabel">Update Password</span>
                            <span class="btn-spinner hidden" id="btnSpinner" aria-hidden="true"></span>
                        </button>
                        <a th:href="@{/user/dashboard}" class="btn btn-secondary btn-lg">Cancel</a>
                    </div>

                </form>

            </div>
        </div>

    </div>

</div>

<th:block layout:fragment="scripts">
<script>
(function () {
    const form        = document.getElementById('changePasswordForm');
    const alertBox    = document.getElementById('alertBox');
    const successBox  = document.getElementById('successBox');
    const submitBtn   = document.getElementById('submitBtn');
    const btnLabel    = document.getElementById('btnLabel');
    const btnSpinner  = document.getElementById('btnSpinner');

    function setLoading(on) {
        submitBtn.disabled = on;
        btnLabel.classList.toggle('hidden', on);
        btnSpinner.classList.toggle('hidden', !on);
    }

    form.addEventListener('submit', async function (e) {
        e.preventDefault();

        hideAlert(alertBox);
        hideAlert(successBox);

        const oldPassword     = document.getElementById('oldPassword').value;
        const newPassword     = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Client-side validation
        if (!oldPassword) {
            showAlert(alertBox, 'Please enter your current password.', 'error');
            return;
        }
        if (newPassword.length < 12) {
            showAlert(alertBox, 'New password must be at least 12 characters.', 'error');
            return;
        }
        if (newPassword !== confirmPassword) {
            showAlert(alertBox, 'New passwords do not match.', 'error');
            return;
        }

        setLoading(true);

        try {
            const res = await apiFetch('/api/auth/change-password', {
                method: 'POST',
                body: JSON.stringify({ oldPassword, newPassword, confirmPassword })
            });

            if (res.ok) {
                showAlert(successBox, 'Password updated successfully. Redirecting…', 'success');
                setTimeout(() => { window.location.href = '/user/dashboard'; }, 2000);
                return;
            }

            let msg = 'Failed to update password.';
            try {
                const err = await res.json();
                msg = err.message || err.error || msg;
            } catch (_) {}
            showAlert(alertBox, msg, 'error');

        } catch (_) {
            showAlert(alertBox, 'Network error. Please try again.', 'error');
        } finally {
            setLoading(false);
        }
    });
})();
</script>
</th:block>

</body>
</html>
