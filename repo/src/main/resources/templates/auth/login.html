<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ReClaim Portal — Sign In</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0d0e10;
            --surface:   #161819;
            --border:    #252729;
            --amber:     #f59e0b;
            --amber-dim: #78490a;
            --text:      #e8e9eb;
            --muted:     #6b7280;
            --error:     #ef4444;
            --success:   #22c55e;
            --mono:      'Courier New', Consolas, monospace;
            --display:   system-ui, -apple-system, sans-serif;
            --body:      system-ui, -apple-system, sans-serif;
        }

        html, body {
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--body);
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Grid noise overlay ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Amber glow blob ── */
        body::after {
            content: '';
            position: fixed;
            width: 640px;
            height: 640px;
            top: -160px;
            right: -160px;
            background: radial-gradient(circle, rgba(245,158,11,.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 480px 1fr;
            grid-template-rows: 1fr;
            align-items: center;
            padding: 2rem;
        }

        /* ── Left: brand panel ── */
        .brand-panel {
            grid-column: 1;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2rem;
        }

        .brand-mark {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            border: 2px solid var(--amber);
            transform: rotate(45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .brand-icon-inner {
            width: 16px;
            height: 16px;
            background: var(--amber);
        }

        .brand-name {
            font-family: var(--display);
            font-size: 1.125rem;
            font-weight: 800;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--text);
        }

        .brand-headline {
            font-family: var(--display);
            font-size: clamp(2rem, 3.5vw, 3rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -.02em;
            color: var(--text);
        }

        .brand-headline em {
            font-style: normal;
            color: var(--amber);
        }

        .brand-desc {
            font-size: .875rem;
            color: var(--muted);
            max-width: 320px;
            line-height: 1.7;
        }

        .brand-stats {
            display: flex;
            flex-direction: column;
            gap: .75rem;
            margin-top: 1rem;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: .75rem;
        }

        .stat-bar {
            height: 2px;
            background: var(--amber);
            animation: barGrow 1.4s ease forwards;
            animation-delay: var(--delay);
            width: 0;
        }

        @keyframes barGrow {
            to { width: var(--w); }
        }

        .stat-label {
            font-family: var(--mono);
            font-size: .7rem;
            color: var(--muted);
            letter-spacing: .08em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* ── Center: card ── */
        .card {
            grid-column: 2;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 3rem;
            position: relative;
            animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* top amber bar */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--amber), transparent);
        }

        /* corner accent */
        .card::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            width: 48px; height: 48px;
            border-bottom: 2px solid var(--amber);
            border-right: 2px solid var(--amber);
            opacity: .4;
        }

        .card-header {
            margin-bottom: 2.5rem;
        }

        .card-eyebrow {
            font-family: var(--mono);
            font-size: .65rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--amber);
            margin-bottom: .75rem;
        }

        .card-title {
            font-family: var(--display);
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -.02em;
            line-height: 1.1;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-family: var(--mono);
            font-size: .65rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: .5rem;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap > svg {
            position: absolute;
            left: .875rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            width: 16px; height: 16px;
            pointer-events: none;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: .875rem;
            padding: .75rem .875rem .75rem 2.5rem;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
            -webkit-appearance: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--amber);
            box-shadow: 0 0 0 3px rgba(245,158,11,.15);
        }

        input::placeholder {
            color: var(--muted);
            opacity: .6;
        }

        /* toggle password */
        .toggle-pw {
            position: absolute;
            right: .5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--muted);
            padding: .5rem;
            line-height: 1;
            transition: color .15s;
            z-index: 2;
        }

        .toggle-pw:hover { color: var(--amber); }

        /* ── Alert ── */
        .alert {
            padding: .75rem 1rem;
            border-left: 3px solid var(--error);
            background: rgba(239,68,68,.08);
            font-size: .8125rem;
            color: var(--error);
            margin-bottom: 1.5rem;
            display: none;
        }

        .alert.visible { display: block; }

        /* ── Submit button ── */
        .btn-primary {
            width: 100%;
            padding: .875rem 1.5rem;
            background: var(--amber);
            color: #0d0e10;
            border: none;
            font-family: var(--display);
            font-size: .9375rem;
            font-weight: 800;
            letter-spacing: .04em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .15s, transform .1s;
            margin-top: .5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover  { background: #fbbf24; }
        .btn-primary:active { transform: scale(.99); }

        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.12) 50%, transparent 100%);
            transform: translateX(-100%);
            transition: transform .4s;
        }

        .btn-primary:hover::after { transform: translateX(100%); }

        /* loading state */
        .btn-primary.loading {
            pointer-events: none;
            opacity: .75;
        }

        .btn-primary.loading span { opacity: 0; }

        .btn-primary .spinner {
            display: none;
            position: absolute;
            inset: 0;
            align-items: center;
            justify-content: center;
        }

        .btn-primary.loading .spinner { display: flex; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .spinner-ring {
            width: 18px; height: 18px;
            border: 2px solid rgba(13,14,16,.3);
            border-top-color: #0d0e10;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        /* ── Footer ── */
        .card-footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-note {
            font-family: var(--mono);
            font-size: .625rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .status-dot {
            width: 6px; height: 6px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }

        /* ── Right: decorative panel ── */
        .deco-panel {
            grid-column: 3;
            padding: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .deco-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .deco-cell {
            width: 32px; height: 32px;
            border: 1px solid var(--border);
            opacity: var(--op);
            animation: cellPulse var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes cellPulse {
            0%, 100% { border-color: var(--border); background: transparent; }
            50% { border-color: var(--amber-dim); background: rgba(245,158,11,.04); }
        }

        /* ── Responsive ── */
        @media (max-width: 1100px) {
            .page {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                max-width: 480px;
                margin: 0 auto;
            }
            .brand-panel, .deco-panel { display: none; }
            .card { grid-column: 1; }
        }
    </style>
</head>
<body>
<div class="page">

    <!-- Left brand panel -->
    <aside class="brand-panel">
        <div class="brand-mark">
            <div class="brand-icon">
                <div class="brand-icon-inner"></div>
            </div>
            <span class="brand-name">ReClaim</span>
        </div>

        <h1 class="brand-headline">
            Asset<br/>
            <em>Recovery</em><br/>
            Portal
        </h1>

        <p class="brand-desc">
            Secure, audited access to contract review, seller management,
            and appointment scheduling for authorized personnel.
        </p>

        <div class="brand-stats">
            <div class="stat-row">
                <div class="stat-bar" style="--w:140px; --delay:.2s;"></div>
                <span class="stat-label">Role-based access</span>
            </div>
            <div class="stat-row">
                <div class="stat-bar" style="--w:100px; --delay:.5s;"></div>
                <span class="stat-label">JWT secured</span>
            </div>
            <div class="stat-row">
                <div class="stat-bar" style="--w:180px; --delay:.8s;"></div>
                <span class="stat-label">Full audit trail</span>
            </div>
        </div>
    </aside>

    <!-- Center login card -->
    <main class="card">
        <div class="card-header">
            <p class="card-eyebrow">Authorized Access Only</p>
            <h2 class="card-title">Sign in</h2>
        </div>

        <div id="alertBox" class="alert" role="alert"></div>

        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrap">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                         aria-hidden="true">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    </svg>
                    <input type="text" id="username" name="username"
                           autocomplete="username" autocapitalize="none" spellcheck="false"
                           placeholder="username" required/>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                         aria-hidden="true">
                        <rect x="3" y="11" width="18" height="11" rx="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="password" name="password"
                           autocomplete="current-password" placeholder="••••••••••••" required/>
                    <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
                        <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                             width="16" height="16">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                             width="16" height="16" style="display:none;">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">
                <span>Sign in</span>
                <div class="spinner" aria-hidden="true">
                    <div class="spinner-ring"></div>
                </div>
            </button>
        </form>

        <footer class="card-footer">
            <span class="footer-note">
                <span class="status-dot"></span>System operational
            </span>
            <span class="footer-note">ReClaim v1.0</span>
        </footer>
    </main>

    <!-- Right decorative panel -->
    <aside class="deco-panel" aria-hidden="true">
        <div class="deco-grid" id="decoGrid"></div>
    </aside>

</div>

<script>
    // ── Decorative grid ──────────────────────────────────────────────
    (function () {
        const grid = document.getElementById('decoGrid');
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'deco-cell';
            const op = (Math.random() * 0.6 + 0.2).toFixed(2);
            const dur = (Math.random() * 4 + 3).toFixed(1) + 's';
            const delay = (Math.random() * 3).toFixed(1) + 's';
            cell.style.cssText = `--op:${op}; --dur:${dur}; --delay:${delay};`;
            grid.appendChild(cell);
        }
    })();

    // ── Password toggle ──────────────────────────────────────────────
    document.getElementById('togglePw').addEventListener('click', function (e) {
        e.preventDefault();
        e.stopPropagation();
        const pw = document.getElementById('password');
        const eyeOpen = document.getElementById('eyeOpen');
        const eyeClosed = document.getElementById('eyeClosed');
        if (pw.type === 'password') {
            pw.type = 'text';
            eyeOpen.style.display = 'none';
            eyeClosed.style.display = 'block';
        } else {
            pw.type = 'password';
            eyeOpen.style.display = 'block';
            eyeClosed.style.display = 'none';
        }
    });

    // ── Login form ───────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const alertBox = document.getElementById('alertBox');
        const btn = document.getElementById('submitBtn');

        alertBox.textContent = '';
        alertBox.classList.remove('visible');

        if (!username || !password) {
            alertBox.textContent = 'Username and password are required.';
            alertBox.classList.add('visible');
            return;
        }

        btn.classList.add('loading');

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                const data = await res.json();

                if (data.forcePasswordReset) {
                    window.location.href = '/auth/change-password';
                } else {
                    // Route based on role: decode JWT payload to check roles
                    let dest = '/user/dashboard';
                    try {
                        const payload = JSON.parse(atob(data.accessToken.split('.')[1]));
                        const roles = payload.roles || [];
                        if (roles.includes('ROLE_ADMIN')) dest = '/admin/dashboard';
                        else if (roles.includes('ROLE_REVIEWER')) dest = '/reviewer/dashboard';
                    } catch (_) {}
                    window.location.href = dest;
                }
                return;
            }

            let message = 'Authentication failed.';
            try {
                const err = await res.json();
                if (err && (err.message || err.error)) {
                    message = err.message || err.error;
                }
            } catch (_) { /* ignore */ }

            alertBox.textContent = message;
            alertBox.classList.add('visible');
            document.getElementById('password').value = '';
            document.getElementById('password').focus();

        } catch (networkErr) {
            alertBox.textContent = 'Network error. Please try again.';
            alertBox.classList.add('visible');
        } finally {
            btn.classList.remove('loading');
        }
    });
</script>
</body>
</html>
