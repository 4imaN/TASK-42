spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration

reclaim:
  security:
    jwt-secret: test-jwt-secret-key-that-is-long-enough-for-hmac-sha-256-algorithm-at-least-256-bits
    refresh-secret: test-refresh-secret-key-that-is-long-enough-for-hmac-sha-256-algorithm-at-least-256-bits
    encryption-key: test-encryption-16c
    access-token-minutes: 30
    refresh-token-days: 7
    max-failed-attempts: 5
    lockout-minutes: 15

  storage:
    root-path: ./target/test-storage
    max-file-size: 3145728
    allowed-extensions: jpg,jpeg,png

  bootstrap:
    passwords-file: ""

  appointments:
    business-start-hour: 8
    business-end-hour: 18
    slot-minutes: 30
    min-advance-hours: 2
    max-advance-days: 14
    pickup-capacity: 5
    dropoff-capacity: 5

  contracts:
    expiring-soon-days: 30
