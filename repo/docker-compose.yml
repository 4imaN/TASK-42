services:
  mysql:
    image: mysql:8.0
    container_name: reclaim-mysql
    environment:
      MYSQL_ROOT_PASSWORD: reclaim_root_pass
      MYSQL_DATABASE: reclaim_portal
      MYSQL_USER: reclaim_user
      MYSQL_PASSWORD: reclaim_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/mysql/conf.d:/etc/mysql/conf.d
    command: --default-authentication-plugin=mysql_native_password --ft_min_word_len=2 --innodb_ft_min_token_size=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reclaim-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/reclaim_portal?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: reclaim_user
      SPRING_DATASOURCE_PASSWORD: reclaim_pass
    volumes:
      - app-secrets:/app/secrets
      - app-storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
  app-secrets:
  app-storage:
